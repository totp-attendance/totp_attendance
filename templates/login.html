{% extends "base.html" %}
{% block title %}교사 로그인{% endblock %}
{% block body %}
<div class="auth-hero">
  <div class="auth-card">
    <div class="auth-logo">✓</div>
    <h1 class="center">출석 시스템</h1>
    <p class="center muted" style="margin-bottom:22px">교사 로그인</p>
    <div class="card">
      {% if err %}<div class="alert err" style="margin-bottom:14px">{{ err }}</div>{% endif %}
      <form method="post" class="stack">
        <div class="field">
          <label for="pw">비밀번호</label>
          <input id="pw" class="input" type="password" name="password" placeholder="교사 비밀번호" autofocus required>
        </div>
        <input type="hidden" name="next" value="{{ next_url }}">
        <button class="btn primary block lg">로그인</button>
      </form>
    </div>
    <p class="center small muted" style="margin-top:18px">학생은 교사가 제공한 QR을 스캔하세요</p>
  </div>
</div>
{% endblock %}
